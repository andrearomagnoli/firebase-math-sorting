<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Area Studente – Math Sorting Game</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
</head>

<body class="bg-light">

  <div class="container py-4">

    <h1 class="text-center mb-4">Area Studente – Math Sorting Game</h1>

    <!-- PANNELLO STUDENTE -->
    <section id="studentPanel" class="mx-auto" style="max-width: 420px;">

      <div class="card shadow-sm">
        <div class="card-body">

          <h2 class="h5 mb-3 text-center">Entra nella sessione</h2>

          <input id="sessionId" class="form-control mb-2" placeholder="Codice partita (es. 1A_2024)">
          <input id="displayName" class="form-control mb-3" placeholder="Cognome">

          <button onclick="joinSession()" class="btn btn-primary w-100">Entra</button>

          <h3 id="status" class="h6 text-center mt-3 text-muted">In attesa…</h3>

        </div>
      </div>

      <!-- Contenitore Phaser -->
      <div id="gameContainer"
           class="mt-4 mx-auto border rounded shadow-sm bg-white"
           style="width:400px; height:600px; display:none;">
      </div>

    </section>

  </div>

  <script src="firebase-config.js"></script>
  <script src="student.js"></script>

  <!-- Bootstrap JS (opzionale) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
