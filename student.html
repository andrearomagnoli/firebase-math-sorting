<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Area Studente – Math Sorting Game</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SOLO UNA VOLTA -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
</head>

<body>

  <h1>Area Studente – Math Sorting Game</h1>

  <section id="studentPanel">
    <h2>Entra nella sessione</h2>

    <input id="sessionId" placeholder="Codice partita (es. 1A_2024)">
    <input id="displayName" placeholder="Cognome">
    <button onclick="joinSession()">Entra</button>

    <h3 id="status">In attesa…</h3>

    <div id="gameContainer"
         style="width:400px; height:600px; border:1px solid #000; display:none;">
    </div>
  </section>

  <!-- Config + Script -->
  <script src="firebase-config.js"></script>
  <script src="student.js"></script>

</body>
</html>
