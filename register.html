<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrazione Docente – Math Sorting Game</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
    </style>
</head>

<body>

    <div class="container py-4">

        <h1 class="text-center mb-4">Area Docente – Math Sorting Game</h1>

        <div class="mx-auto" style="max-width: 420px;">
            <div class="card shadow p-4">
                <h3 class="text-center mb-3">Registrazione Docente</h3>
                <p class="text-muted text-center mb-4">
                    Inserisci i tuoi dati. La registrazione richiede approvazione da parte dell'amministratore.
                </p>

                <div class="mb-3">
                    <label for="registerEmail" class="form-label">Email istituzionale</label>
                    <input type="email" class="form-control" id="registerEmail" placeholder="nome.cognome@scuola.it">
                </div>

                <div class="mb-3">
                    <label for="registerPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="registerPassword" placeholder="Password">
                </div>

                <button id="registerBtn" class="btn btn-primary w-100 mb-3">Registrati</button>

                <div id="registerMessage" class="text-center text-danger fw-semibold" style="display:none;"></div>

                <div class="text-center mt-3">
                    <a href="teacher.html" class="text-decoration-none">Torna al login docente</a>
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="firebase-config-teacher.js"></script>
    <script src="register.js"></script>

</body>
</html>
