<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Area Studente – Math Sorting Game</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js" defer></script>

  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js" defer></script>

  <link rel="stylesheet" href="style.css">

  <style>
    body { background-color: #f5f7fa; }
    .card { border-radius: 12px; }
    .form-control:focus { box-shadow: none; border-color: #0d6efd; }
  </style>
</head>

<body>

  <div class="container py-4">

    <h1 class="text-center mb-4">Area Studente – Math Sorting Game</h1>

    <section id="studentPanel" class="mx-auto" style="max-width: 420px;">

      <div class="card shadow p-4">
        <h2 class="h5 mb-3 text-center">Entra nella sessione</h2>

        <input id="sessionId" class="form-control mb-2" placeholder="Codice partita">
        <input id="displayName" class="form-control mb-3" placeholder="Cognome">

        <button id="joinBtn" class="btn btn-primary w-100">Entra</button>

        <button id="exitBtn" class="btn btn-outline-danger w-100 mt-3" style="display:none;">
          Esci
        </button>

        <h3 id="status" class="h6 text-center mt-3 text-muted">In attesa…</h3>
      </div>

      <div id="gameContainer"
           class="mt-4 mx-auto border rounded shadow bg-white"
           style="width:400px; height:600px; display:none;">
      </div>

    </section>

  </div>

  <script src="firebase-config.js" defer></script>
  <script src="student.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

</body>
</html>
