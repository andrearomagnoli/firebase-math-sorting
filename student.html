<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Area Studente – Math Sorting Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>

  <style>
    body { background-color: #f5f7fa; }
    .card { border-radius: 12px; }
    .form-control:focus { box-shadow: none; border-color: #0d6efd; }

    /* Canvas fullscreen reale */
    #gameContainer canvas {
      display: block;
    }

    /* Il canvas NON deve essere limitato da Bootstrap */
    #gameContainer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      max-width: none !important;
      max-height: none !important;
      overflow: hidden;
      display: none;
      z-index: 1000;
      background: white;
    }
  </style>
</head>
<body>

  <div class="container py-4">
    <h1 id="title" class="text-center mb-4">Area Studente – Math Sorting Game</h1>

    <section id="studentPanel" class="mx-auto" style="max-width: 420px;">
      <div id="loginCard" class="card shadow p-4">
        <h2 class="h5 mb-3 text-center">Entra nella sessione</h2>

        <input id="sessionId" class="form-control mb-2" placeholder="Codice partita">
        <input id="displayName" class="form-control mb-3" placeholder="Cognome">

        <button id="joinBtn" class="btn btn-primary w-100">Entra</button>

        <button id="exitBtn" class="btn btn-outline-danger w-100 mt-3" style="display:none;">
          Esci
        </button>

        <h3 id="status" class="h6 text-center mt-3 text-muted">In attesa…</h3>
        <p id="debug" class="small text-muted text-center" style="display:none;"></p>
      </div>
    </section>
  </div>

  <!-- CANVAS FULLSCREEN FUORI DAL LAYOUT -->
  <div id="gameContainer"
     style="
       position: fixed;
       top: 0; left: 0;
       width: 100vw;
       height: 100vh;
       overflow: hidden;
       display: none;
       background: #ffffff;
       z-index: 1000;
     ">
  </div>

  <!-- Overlay rotazione -->
  <div id="rotateWarning"
     style="
       position: fixed;
       top: 0; left: 0;
       width: 100vw; height: 100vh;
       background: rgba(0,0,0,0.85);
       color: white;
       display: none;
       justify-content: center;
       align-items: center;
       text-align: center;
       font-size: 22px;
       padding: 20px;
       z-index: 9999;
     ">
    Ruota il telefono in verticale per giocare
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script src="firebase-config-student.js"></script>
  <script src="student.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

  <!-- Script blocco orientamento -->
  <script>
    function checkOrientation() {
      const warning = document.getElementById("rotateWarning");
      const gameContainer = document.getElementById("gameContainer");

      if (window.innerWidth > window.innerHeight) {
        warning.style.display = "flex";
        if (gameContainer) {
          gameContainer.style.visibility = "hidden";
          gameContainer.style.pointerEvents = "none";
        }
      } else {
        warning.style.display = "none";
        if (gameContainer) {
          gameContainer.style.visibility = "visible";
          gameContainer.style.pointerEvents = "auto";
        }
      }
    }

    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", checkOrientation);
    document.addEventListener("DOMContentLoaded", checkOrientation);
  </script>

</body>
</html>
