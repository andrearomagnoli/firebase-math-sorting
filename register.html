<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrazione Docente</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Stile personalizzato -->
    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
    </style>
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow p-4" style="max-width: 420px; width: 100%;">
            <h3 class="text-center mb-3">Registrazione Docente</h3>
            <p class="text-muted text-center mb-4">
                Inserisci i tuoi dati. La registrazione richiede approvazione da parte dell'amministratore.
            </p>

            <div class="mb-3">
                <label for="registerEmail" class="form-label">Email istituzionale</label>
                <input type="email" class="form-control" id="registerEmail" placeholder="nome.cognome@scuola.it">
            </div>

            <div class="mb-3">
                <label for="registerPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="registerPassword" placeholder="Password">
            </div>

            <button id="registerBtn" class="btn btn-primary w-100 mb-3">Registrati</button>

            <div id="registerMessage" class="text-center text-danger fw-semibold" style="display:none;"></div>

            <div class="text-center mt-3">
                <a href="teacher.html" class="text-decoration-none">Torna al login docente</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script Firebase -->
    <script src="register.js"></script>
</body>
</html>
