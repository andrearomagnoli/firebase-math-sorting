<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Area Studente – Math Sorting Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Phaser (DEVE essere caricato PRIMA di student.js) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>

  <!-- Firebase (DEVE essere caricato PRIMA di student.js) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body { background-color: #f5f7fa; }
    .card { border-radius: 12px; }
    .form-control:focus { box-shadow: none; border-color: #0d6efd; }

    /* Assicura che il canvas riempia il contenitore */
    #gameContainer canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* Mobile friendly: contenitore centrato e responsive */
    #gameContainer {
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <div class="container py-4">
    <h1 class="text-center mb-4">Area Studente – Math Sorting Game</h1>

    <section id="studentPanel" class="mx-auto" style="max-width: 420px;">
      <div class="card shadow p-4">
        <h2 class="h5 mb-3 text-center">Entra nella sessione</h2>

        <input id="sessionId" class="form-control mb-2" placeholder="Codice partita">
        <input id="displayName" class="form-control mb-3" placeholder="Cognome">

        <button id="joinBtn" class="btn btn-primary w-100">Entra</button>

        <button id="exitBtn" class="btn btn-outline-danger w-100 mt-3" style="display:none;">
          Esci
        </button>

        <h3 id="status" class="h6 text-center mt-3 text-muted">In attesa…</h3>
        <p id="debug" class="small text-muted text-center" style="display:none;"></p>
      </div>

      <div id="gameContainer"
           class="mt-4 mx-auto border rounded shadow bg-white"
           style="width:400px; height:600px; display:none;">
      </div>
    </section>
  </div>

  <!-- Inserisci qui la tua configurazione Firebase -->
  <script src="firebase-config.js"></script>

  <!-- Script di gioco -->
  <script src="student.js"></script>

  <!-- Bootstrap JS (defer ok) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
