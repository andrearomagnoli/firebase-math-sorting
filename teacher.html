<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Area Docente – Math Sorting Game</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body>

  <h1>Area Docente – Math Sorting Game</h1>

  <!-- LOGIN -->
  <section id="loginForm">
    <h2>Login Docente</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="loginTeacher()">Accedi</button>
    <p id="loginError" style="color:red;"></p>
  </section>

  <!-- PANNELLO DOCENTE -->
  <section id="teacherPanel" style="display:none;">

    <button id="logoutBtn">Logout</button>

    <h2>Gestione Sessione</h2>
    <p id="sessionStatus"></p>

    <!-- CREAZIONE SESSIONE -->
    <div id="createSessionBox">
      <input id="sessionId" placeholder="ID sessione">
      <button onclick="createSession()">Crea sessione</button>
    </div>

    <!-- SESSIONE ATTIVA -->
    <div id="activeSessionBox" style="display:none;">
      <h3 id="activeSessionLabel"></h3>
      <button onclick="deleteSession()">Elimina sessione</button>
    </div>

    <!-- AVVIO PARTITA -->
    <div id="startSessionBox" style="display:none; margin-top:20px;">
      <button onclick="startSession()">Avvia partita</button>
    </div>

    <h2>Studenti collegati</h2>
    <div id="playersList">Nessuno studente collegato</div>

    <h2>Punteggi</h2>
    <div id="scores">Nessun punteggio ancora</div>

  </section>

  <script src="firebase-config.js"></script>
  <script src="teacher.js"></script>

</body>
</html>
