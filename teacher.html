<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Area Docente – Math Sorting Game</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body { background-color: #f5f7fa; }
    .card { border-radius: 12px; }
    .form-control:focus { box-shadow: none; border-color: #0d6efd; }
  </style>
</head>

<body>

  <div class="container py-4">

    <h1 class="text-center mb-4">Area Docente – Math Sorting Game</h1>

    <!-- LOGIN -->
    <section id="loginForm" class="mx-auto" style="max-width: 420px;">
      <div class="card shadow p-4">
        <h2 class="h4 mb-3 text-center">Login Docente</h2>

        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">

        <button id="loginBtn" class="btn btn-primary w-100">Accedi</button>

        <p id="loginError" class="text-danger mt-3 text-center"></p>

        <div class="text-center mt-3">
          <a href="register.html" class="text-decoration-none">Non sei registrato? Richiedi l’accesso</a>
        </div>
      </div>
    </section>

    <!-- PANNELLO DOCENTE -->
    <section id="teacherPanel" style="display:none;">

      <div class="d-flex justify-content-end mb-3">
        <button id="logoutBtn" class="btn btn-outline-secondary">Logout</button>
      </div>

      <div class="card shadow p-4 mb-4">
        <h2 class="h5">Gestione Sessione</h2>
        <p id="sessionStatus" class="text-muted"></p>

        <!-- CREAZIONE SESSIONE -->
        <div id="createSessionBox">
          <div class="input-group mb-3">
            <input id="sessionId" class="form-control" placeholder="ID sessione">
            <button id="createSessionBtn" class="btn btn-success">Crea</button>
          </div>
        </div>

        <!-- SESSIONE ATTIVA -->
        <div id="activeSessionBox" style="display:none;">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 id="activeSessionLabel" class="h6 m-0"></h3>
            <button id="deleteSessionBtn" class="btn btn-danger btn-sm">Elimina</button>
          </div>
        </div>

        <!-- AVVIO PARTITA -->
        <div id="startSessionBox" style="display:none;">
          <button id="startSessionBtn" class="btn btn-primary w-100">Avvia partita</button>
        </div>
      </div>

      <div class="row g-4">

        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header bg-primary text-white">Studenti collegati</div>
            <div class="card-body">
              <div id="playersList">Nessuno studente collegato</div>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header bg-dark text-white">Punteggi</div>
            <div class="card-body">
              <div id="scores">Nessun punteggio ancora</div>
            </div>
          </div>
        </div>

      </div>

    </section>

  </div>

  <script src="firebase-config.js" defer></script>
  <script src="teacher.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
